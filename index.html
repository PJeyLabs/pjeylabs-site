<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PJeyLabs - Software Development & Experimental Lab</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #12161a; /* Dopasowane do ciemnego tła z grafiki */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 90%;
        }
        .logo {
            max-width: 600px; /* Maksymalna szerokość logo na ekranie */
            width: 100%;
            height: auto;
            animation: fadeIn 1.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Nasze nowe logo jako główny element strony -->
        <img src="logo.png" alt="PJeyLabs Logo" class="logo">
    </div>

</body>
</html>
