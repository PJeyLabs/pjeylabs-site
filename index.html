<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="PJey Labs creates practical cross-platform apps and AI-powered tools for productivity, development, and everyday work."
  />
  <title>PJey Labs</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    :root {
      --bg: #060d14;
      --surface: #0f161f;
      --surface-strong: #141d29;
      --text: #eef6ff;
      --muted: #9eb0bf;
      --line: rgba(168, 255, 214, 0.15);
      --line-soft: rgba(168, 255, 214, 0.08);
      --accent: #20d68b;
      --accent-soft: rgba(32, 214, 139, 0.16);
      --shadow: 0 24px 54px rgba(0, 0, 0, 0.45);
      --radius: 10px;
      --max: 1120px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "Segoe UI", "Noto Sans", system-ui, -apple-system, sans-serif;
      color: var(--text);
      background:
        radial-gradient(120% 80% at 25% 0%, rgba(32, 214, 139, 0.15), transparent 58%),
        radial-gradient(90% 80% at 90% 10%, rgba(32, 214, 139, 0.08), transparent 58%),
        linear-gradient(180deg, #050910 0%, #060d14 44%, #04070c 100%);
      line-height: 1.5;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background-image: linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025) 1px, transparent 1px);
      background-size: 88px 88px;
      opacity: 0.5;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(100% - 2rem, var(--max));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--line-soft);
      background: rgba(6, 13, 20, 0.9);
    }

    .header-inner {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .brand img {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: 1px solid rgba(32, 214, 139, 0.34);
      object-fit: cover;
      box-shadow: 0 0 22px rgba(32, 214, 139, 0.2);
      background: rgba(255, 255, 255, 0.02);
    }

    .tabs {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0;
      padding: 0;
      list-style: none;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .tabs button {
      appearance: none;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      font-size: 0.93rem;
      padding: 0.42rem 0.86rem;
      min-height: 38px;
      border-radius: 8px;
      transition: all 160ms ease;
    }

    .tabs button[aria-current="page"] {
      color: var(--text);
      border-color: var(--line);
      background: rgba(32, 214, 139, 0.09);
      box-shadow: inset 0 0 0 1px rgba(32, 214, 139, 0.16);
    }

    .tabs button:hover,
    .tabs button:focus-visible {
      outline: none;
      color: var(--text);
      border-color: var(--line);
      background: rgba(255, 255, 255, 0.06);
    }

    .hero {
      padding: clamp(2.3rem, 5vw, 3.6rem) 0 2.4rem;
    }

    .logo-block {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      margin-bottom: 1rem;
    }

    .logo-copy {
      min-width: 0;
    }

    .logo-block img {
      width: 132px;
      height: 132px;
      border-radius: 14px;
      object-fit: cover;
      border: 1px solid rgba(32, 214, 139, 0.4);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.22);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      margin-bottom: 0.7rem;
      font-size: clamp(2.1rem, 5vw, 3rem);
      line-height: 1.1;
    }

    .hero p {
      color: var(--muted);
      max-width: 74ch;
      font-size: 1.05rem;
    }

    .hero-copy {
      max-width: 78ch;
      margin-bottom: 1.2rem;
    }

    .page {
      padding: 1.8rem 0 2.2rem;
    }

    .section-title {
      margin: 0 0 0.35rem;
      font-size: clamp(1.45rem, 3vw, 2.15rem);
    }

    .section-subtitle {
      color: var(--muted);
      margin-bottom: 1.2rem;
    }

    .state-line {
      margin: 0.8rem 0 0.9rem;
      padding: 0.6rem 0.8rem;
      border-radius: 8px;
      border: 1px solid var(--line-soft);
      background: rgba(32, 214, 139, 0.07);
      color: #d8fce8;
      font-size: 0.93rem;
      display: none;
    }

    .state-line.visible {
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(225px, 1fr));
      gap: 0.85rem;
    }

    .card {
      border: 1px solid var(--line-soft);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.01));
      padding: 1rem;
      min-height: 250px;
      display: flex;
      flex-direction: column;
      gap: 0.56rem;
      transition: transform 160ms ease, border-color 160ms ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(32, 214, 139, 0.34);
      box-shadow: var(--shadow);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .product-icon {
      width: 42px;
      height: 42px;
      border-radius: 9px;
      border: 1px solid rgba(32, 214, 139, 0.35);
      display: grid;
      place-items: center;
      overflow: hidden;
      flex: 0 0 auto;
      font-size: 0.84rem;
      font-weight: 800;
      background: rgba(168, 255, 214, 0.08);
      color: #0f2116;
    }

    .product-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card h3 {
      font-size: 1.04rem;
      line-height: 1.12;
      margin-bottom: 0.1rem;
    }

    .meta {
      color: #b5c9d5;
      font-size: 0.84rem;
      margin: 0;
    }

    .meta strong {
      color: var(--text);
    }

    .description {
      margin-top: 0.4rem;
      color: var(--muted);
      font-size: 0.92rem;
      flex: 1;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      min-height: 28px;
    }

    .chip {
      border: 1px solid rgba(32, 214, 139, 0.35);
      background: rgba(32, 214, 139, 0.08);
      color: #d9ffe6;
      font-size: 0.74rem;
      padding: 0.22rem 0.6rem;
      border-radius: 999px;
      line-height: 1.2;
    }

    .chip.plan-free {
      background: rgba(64, 224, 142, 0.18);
      border-color: rgba(64, 224, 142, 0.45);
      color: #d1ffe5;
    }

    .chip.plan-pro {
      background: rgba(255, 204, 102, 0.2);
      border-color: rgba(255, 204, 102, 0.45);
      color: #ffeac9;
    }

    .actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: auto;
    }

    .button {
      border: 1px solid rgba(32, 214, 139, 0.34);
      color: #0b1411;
      background: linear-gradient(130deg, var(--accent), #4ee0aa);
      min-height: 36px;
      padding: 0.4rem 0.85rem;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 130ms ease;
    }

    .button[type="button"] {
      cursor: pointer;
    }

    .button.secondary {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
    }

    .button:hover,
    .button:focus-visible {
      transform: translateY(-1px);
      outline: none;
    }

    .button[aria-disabled="true"],
    .button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
      color: var(--muted);
      background: transparent;
      border-color: rgba(255, 255, 255, 0.2);
    }

    .button-tooltip {
      display: inline-flex;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .apps-scroll {
      display: grid;
      gap: 0.85rem;
      max-height: calc(100vh - 350px);
      overflow: auto;
      padding-right: 0.2rem;
      scrollbar-width: thin;
      scrollbar-color: rgba(168, 255, 214, 0.45) transparent;
    }

    .apps-scroll::-webkit-scrollbar {
      width: 8px;
    }

    .apps-scroll::-webkit-scrollbar-thumb {
      background: rgba(168, 255, 214, 0.45);
      border-radius: 8px;
    }

    .apps-preview-empty {
      border: 1px dashed rgba(32, 214, 139, 0.32);
      border-radius: var(--radius);
      padding: 1rem;
      color: #aec0d0;
      background: rgba(255, 255, 255, 0.03);
    }

    .about-grid {
      border: 1px solid var(--line-soft);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.032), rgba(255, 255, 255, 0.012));
      padding: 1.2rem;
      display: grid;
      gap: 0.8rem;
      max-width: 70ch;
    }

    .contact-list {
      display: grid;
      gap: 0.4rem;
    }

    .contact-list a {
      text-decoration: underline;
      text-underline-offset: 2px;
      width: fit-content;
      color: var(--accent);
      font-weight: 700;
    }

    .site-footer {
      margin-top: 1.5rem;
      border-top: 1px solid var(--line-soft);
      padding: 1.1rem 0;
      background: rgba(6, 13, 20, 0.9);
      color: var(--muted);
      font-size: 0.88rem;
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 860px) {
      .header-inner {
        flex-direction: column;
        align-items: flex-start;
        padding: 0.7rem 0 0.5rem;
      }

      .tabs {
        width: 100%;
        justify-content: flex-start;
      }

      .tabs button {
        padding: 0.34rem 0.68rem;
      }

      .logo-block {
        align-items: flex-start;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .footer-inner {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (max-width: 460px) {
      .logo-block img {
        width: 94px;
        height: 94px;
      }

      .logo-block {
        flex-direction: column;
      }

      .hero {
        padding-top: 1.6rem;
      }
    }
  </style>
</head>
<body>
  <div id="app" aria-live="polite"></div>

  <script type="module">
    const navTabs = [
      { id: "home", label: "Home" },
      { id: "products", label: "Products / Apps Hub" },
      { id: "about", label: "About" },
    ];

    const FIREBASE_CONFIG = {
      projectId: "pjeylabs-hub",
      authDomain: "pjeylabs-hub.firebaseapp.com",
      apiKey: "AIzaSyDT2hxZM8rTIUsdIAUfux-meM5fhbsUg40",
      appId: "1:440485471383:web:7dfda16c52098a9bfbf5d2",
      messagingSenderId: "440485471383",
      storageBucket: "pjeylabs-hub.firebasestorage.app",
    };

    const APP_COLLECTION_NAME = "public_apps";
    const PLATFORM_LINK_MAP = [
      { key: "windowsUrl", platformKey: "windows", label: "Windows", platform: "Windows" },
      { key: "androidUrl", platformKey: "android", label: "Android", platform: "Android" },
      { key: "iosUrl", platformKey: "ios", label: "iOS", platform: "iOS" },
      { key: "macosUrl", platformKey: "macos", label: "macOS", platform: "macOS" },
      { key: "linuxUrl", platformKey: "linux", label: "Linux", platform: "Linux" },
    ];
    const DOWNLOAD_UNAVAILABLE_MESSAGE = "Download link not available";

    const GENERAL_LINK_MAP = [
      { key: "downloadUrl", label: "Download", type: "download" },
      { key: "webUrl", label: "Website", type: "website" },
      { key: "websiteUrl", label: "Website", type: "website" },
      { key: "moreInfoUrl", label: "Details", type: "details" },
    ];

    const STORE_LINK_LABELS = {
      android: "Android",
      windows: "Windows",
      linux: "Linux",
      macos: "macOS",
      ios: "iOS",
      web: "Website",
      website: "Website",
      download: "Download",
    };

    const APP_STATUS_PRIORITY = ["isFeatured", "featured", "pinned", "isActive", "active"];
    const PLATFORM_SORT_ORDER = ["Windows", "Android", "Linux", "macOS", "iOS", "Web", "Other"];

    const state = {
      activePage: "home",
      apps: [],
      status: "loading",
      error: "",
      sourceCollection: null,
    };

    const appRoot = document.getElementById("app");

    const hasValue = (value) =>
      typeof value === "string" && value.trim() !== "" && value.trim().toLowerCase() !== "coming_soon";

    const getSafeText = (value, fallback = "") => {
      if (hasValue(value)) {
        return value.trim();
      }

      return fallback;
    };

    const toNumber = (value) => {
      if (typeof value === "number" && Number.isFinite(value)) {
        return value;
      }

      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : null;
    };

    const toEpoch = (value) => {
      if (value == null) {
        return 0;
      }

      if (typeof value === "number" && Number.isFinite(value)) {
        return value;
      }

      if (value instanceof Date) {
        return value.getTime();
      }

      if (typeof value?.toDate === "function") {
        const date = value.toDate();
        return date instanceof Date ? date.getTime() : 0;
      }

      const parsed = Date.parse(String(value));
      return Number.isFinite(parsed) ? parsed : 0;
    };

    const normalizeId = (value) => {
      if (hasValue(value)) {
        return value.trim();
      }

      if (typeof crypto !== "undefined" && typeof crypto.randomUUID === "function") {
        return crypto.randomUUID();
      }

      return `app-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    };

    function normalizeUrl(value) {
      if (!hasValue(value)) {
        return "";
      }

      try {
        const trimmed = value.trim();
        const candidate = /^[a-z][a-z0-9+.-]*:/i.test(trimmed) ? trimmed : `https://${trimmed}`;
        const parsed = new URL(candidate);
        return parsed.protocol === "http:" || parsed.protocol === "https:" ? parsed.href : "";
      } catch {
        return "";
      }
    }

    function normalizeHttpsUrl(value) {
      if (!hasValue(value)) {
        return "";
      }

      const trimmed = value.trim();
      if (!trimmed.toLowerCase().startsWith("https://")) {
        return "";
      }

      try {
        const parsed = new URL(trimmed);
        return parsed.protocol === "https:" ? parsed.href : "";
      } catch {
        return "";
      }
    }

    function readRecordValue(record, keys) {
      if (!record || typeof record !== "object" || Array.isArray(record)) {
        return "";
      }

      for (const key of keys) {
        if (hasValue(record[key])) {
          return record[key];
        }
      }

      const normalizedKeys = keys.map((key) => String(key).toLowerCase());
      const match = Object.entries(record).find(([key]) => normalizedKeys.includes(String(key).toLowerCase()));
      return match && hasValue(match[1]) ? match[1] : "";
    }

    function readArrayLinkValue(links, linkConfig) {
      if (!Array.isArray(links)) {
        return "";
      }

      const expected = [linkConfig.platformKey, linkConfig.label, linkConfig.platform]
        .map((value) => String(value).toLowerCase());
      const match = links.find((entry) => {
        if (!entry || typeof entry !== "object") {
          return false;
        }

        const labels = [entry.platform, entry.label, entry.type, entry.key]
          .filter(hasValue)
          .map((value) => String(value).toLowerCase());
        return labels.some((label) => expected.includes(label) || normalizePlatformName(label) === linkConfig.platform);
      });

      return match ? match.url || match.href || "" : "";
    }

    function getPlatformRawUrls(product, linkConfig) {
      const nestedKeys = [linkConfig.platformKey, linkConfig.label, linkConfig.key];
      return [
        product[linkConfig.key],
        readRecordValue(product.platformLinks, nestedKeys),
        readRecordValue(product.storeLinks, nestedKeys),
        readArrayLinkValue(product.links, linkConfig),
      ].filter(hasValue);
    }

    function normalizePlatformDownloads(product) {
      const explicitPlatforms = new Set();

      if (Array.isArray(product.platforms)) {
        product.platforms.forEach((platform) => {
          const normalized = normalizePlatformName(platform);
          if (normalized !== "General") {
            explicitPlatforms.add(normalized);
          }
        });
      }

      if (hasValue(product.platform)) {
        const normalized = normalizePlatformName(product.platform);
        if (normalized !== "General") {
          explicitPlatforms.add(normalized);
        }
      }

      return PLATFORM_LINK_MAP.map((linkConfig) => {
        const rawUrls = getPlatformRawUrls(product, linkConfig);
        const href = rawUrls.map(normalizeHttpsUrl).find(Boolean) || "";
        const shouldRender = explicitPlatforms.has(linkConfig.platform) || rawUrls.length > 0 || Boolean(href);

        if (!shouldRender) {
          return null;
        }

        if (!href) {
          console.debug(`${linkConfig.label} download URL missing or invalid`);
        }

        return {
          href,
          label: linkConfig.label,
          platform: linkConfig.platform,
        };
      }).filter(Boolean);
    }

    function normalizePlatformName(value) {
      const text = getSafeText(value, "").toLowerCase();
      if (text.includes("windows") || text === "win" || text === "win32") {
        return "Windows";
      }

      if (text.includes("mac")) {
        return "macOS";
      }

      if (text.includes("ios")) {
        return "iOS";
      }

      if (text.includes("android")) {
        return "Android";
      }

      if (text.includes("linux")) {
        return "Linux";
      }

      if (text.includes("web")) {
        return "Web";
      }

      return getSafeText(value, "General");
    }

    function normalizePlan(product) {
      if (typeof product.isPro === "boolean") {
        return product.isPro ? "Pro" : "Free";
      }

      if (typeof product.isFree === "boolean") {
        return product.isFree ? "Free" : null;
      }

      const price = toNumber(product.price);
      if (price != null) {
        return price > 0 ? "Pro" : "Free";
      }

      const plan = getSafeText(product.plan || product.tier || product.pricing || product.license || product.accessMode).toLowerCase();
      if (!plan) {
        return null;
      }

      if (plan.includes("free")) {
        return "Free";
      }

      if (plan.includes("pro") || plan.includes("premium") || plan.includes("paid")) {
        return "Pro";
      }

      return getSafeText(product.plan || product.tier || product.pricing || product.license || product.accessMode, "Free");
    }

    function normalizeLinks(product) {
      const entries = [];
      const seen = new Set();
      const platformStoreKeys = new Set(
        PLATFORM_LINK_MAP.flatMap((entry) => [entry.platformKey, entry.label.toLowerCase(), entry.key.toLowerCase()])
      );
      const push = (url, label, type) => {
        const href = normalizeUrl(url);
        if (!href) {
          return;
        }

        const key = `${type}::${href}`;
        if (seen.has(key)) {
          return;
        }

        seen.add(key);
        entries.push({
          href,
          label,
          type,
        });
      };

      GENERAL_LINK_MAP.forEach(({ key, label, type }) => {
        push(product[key], label, type);
      });

      if (product.storeLinks && typeof product.storeLinks === "object" && !Array.isArray(product.storeLinks)) {
        Object.entries(product.storeLinks).forEach(([rawKey, rawUrl]) => {
          const key = String(rawKey).trim().toLowerCase();
          if (platformStoreKeys.has(key)) {
            return;
          }

          const label = STORE_LINK_LABELS[key] || normalizePlatformName(key);
          const type = label === "Website" ? "website" : "download";
          push(rawUrl, label, type);
        });
      }

      if (Array.isArray(product.links)) {
        product.links.forEach((entry) => {
          if (!entry || typeof entry !== "object") {
            return;
          }

          const href = normalizeUrl(entry.url || entry.href);
          if (!href) {
            return;
          }

          const label = getSafeText(entry.label, "Details");
          const type = getSafeText(entry.type, "details").toLowerCase();
          const normalizedLabel = normalizePlatformName(label);
          if (PLATFORM_LINK_MAP.some((platform) => platform.platform === normalizedLabel)) {
            return;
          }

          const key = `${type}::${href}`;
          if (!seen.has(key)) {
            seen.add(key);
            entries.push({ href, label, type });
          }
        });
      }

      return entries;
    }

    function normalizePlatforms(product, platformDownloads = []) {
      const platforms = new Set();

      if (Array.isArray(product.platforms)) {
        product.platforms.forEach((platform) => {
          const normalized = normalizePlatformName(platform);
          if (normalized !== "General") {
            platforms.add(normalized);
          }
        });
      }

      platformDownloads.forEach((download) => {
        if (download?.platform) {
          platforms.add(download.platform);
        }
      });

      if (!platforms.size && hasValue(product.platform)) {
        const normalized = normalizePlatformName(product.platform);
        if (normalized) {
          platforms.add(normalized);
        }
      }

      const ordered = PLATFORM_SORT_ORDER.filter((value) => platforms.has(value));
      const remainder = [...platforms].filter((value) => !PLATFORM_SORT_ORDER.includes(value)).sort();

      return [...ordered, ...remainder];
    }

    function isLikelyAppDocument(document) {
      const checks = [document.name, document.title, document.appName, document.productName, document.shortDescription];
      return checks.some((entry) => hasValue(entry));
    }

    function normalizeAppData(source = {}) {
      const appData = source || {};
      const links = normalizeLinks(appData);
      const platformDownloads = normalizePlatformDownloads(appData);
      const platforms = normalizePlatforms(appData, platformDownloads);
      const plan = normalizePlan(appData);
      const createdAt = toEpoch(
        appData.createdAt || appData.created_at || appData.updatedAt || appData.updated_at || appData.publishedAt
      );
      const order = toNumber(appData.order || appData.sortOrder || appData.rank || appData.displayOrder);
      const featured = APP_STATUS_PRIORITY.some((key) => {
        const candidate = appData[key];
        return candidate === true || candidate === "true";
      });

      return {
        id: normalizeId(appData.appId || appData.id),
        name: getSafeText(appData.name || appData.title || appData.appName || appData.productName, "Unnamed app"),
        shortDescription: getSafeText(
          appData.shortDescription || appData.tagline || appData.summary,
          "A PJey Labs application."
        ),
        description: getSafeText(appData.description || appData.body || appData.details, ""),
        version: getSafeText(appData.version || appData.appVersion || appData.currentVersion, "Not specified"),
        iconUrl: normalizeUrl(appData.iconUrl || appData.imageUrl || appData.thumbnailUrl),
        platforms,
        platformDownloads,
        plan: plan || "Free",
        links,
        featured,
        order: order == null ? Number.MAX_SAFE_INTEGER : order,
        updatedAt: createdAt,
        isActive: appData.isActive !== false && appData.active !== false,
      };
    }

    class FirebaseAppsService {
      constructor(config) {
        this.config = config;
      }

      isConfigured() {
        return ["projectId", "authDomain", "apiKey", "appId", "messagingSenderId", "storageBucket"].every((field) => {
          const value = this.config[field];
          return typeof value === "string" && value.trim() !== "";
        });
      }

      async loadApps() {
        if (!this.isConfigured()) {
          return {
            apps: [],
            sourceCollection: null,
            status: "empty",
            error: "PJey Labs Hub configuration is incomplete.",
          };
        }

        const [{ initializeApp, getApps }, { getFirestore, collection, getDocs }] = await Promise.all([
          import("https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js"),
          import("https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js"),
        ]);

        const app = getApps().length > 0 ? getApps()[0] : initializeApp(this.config);
        const db = getFirestore(app);

        try {
          const docs = await getDocs(collection(db, APP_COLLECTION_NAME));
          const mapped = docs.docs
            .map((doc) => ({ appId: doc.id, ...(doc.data() || {}) }))
            .filter(isLikelyAppDocument)
            .map(normalizeAppData)
            .filter((item) => hasValue(item.name) && item.isActive);

          return {
            apps: mapped.sort(compareAppSort),
            sourceCollection: APP_COLLECTION_NAME,
            status: mapped.length === 0 ? "empty" : "loaded",
            error: mapped.length === 0 ? "No active apps are available yet." : "",
          };
        } catch (error) {
          return {
            apps: [],
            sourceCollection: APP_COLLECTION_NAME,
            status: "error",
            error: error?.message || `Unable to read collection "${APP_COLLECTION_NAME}".`,
          };
        }
      }
    }

    function compareAppSort(a, b) {
      if (a.featured !== b.featured) {
        return b.featured ? 1 : -1;
      }

      if (a.order !== b.order) {
        return a.order - b.order;
      }

      if (a.updatedAt !== b.updatedAt) {
        return b.updatedAt - a.updatedAt;
      }

      return a.name.localeCompare(b.name);
    }

    function openPlatformDownload(download) {
      if (!download?.href) {
        console.debug(`${download?.label || "Platform"} download URL missing or invalid`);
        return;
      }

      console.debug(`Opening ${download.label} download URL: ${download.href}`);
      const openedWindow = window.open(download.href, "_blank");
      if (openedWindow) {
        openedWindow.opener = null;
      }
    }

    function makeTabs(activePageId, onChange) {
      const nav = document.createElement("nav");
      nav.className = "tabs";
      nav.setAttribute("aria-label", "Primary");

      navTabs.forEach((tab) => {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = tab.label;
        button.setAttribute("data-page", tab.id);
        button.setAttribute("aria-current", String(tab.id === activePageId));
        button.addEventListener("click", () => onChange(tab.id));
        nav.append(button);
      });

      return nav;
    }

    function makeHeader() {
      const header = document.createElement("header");
      header.className = "site-header";
      const inner = document.createElement("div");
      inner.className = "container header-inner";

      const brand = document.createElement("a");
      brand.href = "#";
      brand.className = "brand";
      brand.setAttribute("aria-label", "PJey Labs home");
      brand.addEventListener("click", (event) => {
        event.preventDefault();
        setPage("home");
      });

      const logo = document.createElement("img");
      logo.src = "pjey-labs-logo.png";
      logo.width = 40;
      logo.height = 40;
      logo.alt = "PJey Labs logo";
      const name = document.createElement("span");
      name.textContent = "PJey Labs";
      brand.append(logo, name);

      inner.append(brand, makeTabs(state.activePage, setPage));
      header.append(inner);
      return header;
    }

    function AppCard(app, options = {}) {
      const compact = options.compact === true;
      const card = document.createElement("article");
      card.className = "card app-card";

      const head = document.createElement("div");
      head.className = "card-header";

      const iconWrap = document.createElement("div");
      iconWrap.className = "product-icon";
      if (app.iconUrl) {
        const iconImage = document.createElement("img");
        iconImage.src = app.iconUrl;
        iconImage.alt = "";
        iconImage.loading = "lazy";
        iconWrap.append(iconImage);
      } else {
        iconWrap.textContent = app.name
          .split(" ")
          .slice(0, 2)
          .map((word) => word[0])
          .join("")
          .toUpperCase() || "PJ";
      }

      const heading = document.createElement("div");
      const title = document.createElement("h3");
      title.textContent = app.name;
      const metadata = document.createElement("p");
      metadata.className = "meta";
      metadata.textContent = `Version: ${app.version}`;

      heading.append(title, metadata);
      head.append(iconWrap, heading);

      const description = document.createElement("p");
      description.className = "description";
      description.textContent = compact ? app.shortDescription : app.description || app.shortDescription;

      const chips = document.createElement("div");
      chips.className = "chips";

      if (app.platforms.length > 0) {
        app.platforms.forEach((platform) => {
          const chip = document.createElement("span");
          chip.className = "chip";
          chip.textContent = platform;
          chips.append(chip);
        });
      } else {
        const chip = document.createElement("span");
        chip.className = "chip";
        chip.textContent = "General";
        chips.append(chip);
      }

      if (app.plan) {
        const planChip = document.createElement("span");
        planChip.className = `chip ${app.plan.toLowerCase() === "free" ? "plan-free" : "plan-pro"}`;
        planChip.textContent = app.plan;
        chips.append(planChip);
      }

      const actions = document.createElement("div");
      actions.className = "actions";

      const platformDownloads = Array.isArray(app.platformDownloads) ? app.platformDownloads : [];
      const downloadLinks = app.links.filter((link) => link.type === "download");
      const primary = platformDownloads.find((download) => download.href) || downloadLinks[0];
      const website = app.links.find((link) => link.type === "website");
      const details = app.links.find((link) => link.type === "details") || app.links.find(
        (link) => link.label.toLowerCase() === "details" || link.label.toLowerCase() === "more info"
      );

      let hasPrimaryDownloadButton = false;
      const addPlatformButton = (download) => {
        const isAvailable = Boolean(download.href);
        const isSecondary = hasPrimaryDownloadButton || !isAvailable;
        const button = document.createElement("button");
        button.type = "button";
        button.className = `button${isSecondary ? " secondary" : ""}`;
        button.textContent = download.label;

        if (isAvailable) {
          button.addEventListener("click", (event) => {
            event.preventDefault();
            event.stopPropagation();
            openPlatformDownload(download);
          });
          hasPrimaryDownloadButton = true;
          actions.append(button);
          return;
        }

        button.disabled = true;
        button.setAttribute("aria-disabled", "true");
        button.setAttribute("aria-label", `${download.label}: ${DOWNLOAD_UNAVAILABLE_MESSAGE}`);

        const tooltip = document.createElement("span");
        tooltip.className = "button-tooltip";
        tooltip.title = DOWNLOAD_UNAVAILABLE_MESSAGE;
        const helper = document.createElement("span");
        helper.className = "sr-only";
        helper.textContent = DOWNLOAD_UNAVAILABLE_MESSAGE;
        tooltip.append(button, helper);
        actions.append(tooltip);
      };

      const addButton = (link, label, secondary = false) => {
        const button = document.createElement("a");
        button.className = `button${secondary ? " secondary" : ""}`;
        button.href = link.href;
        button.target = "_blank";
        button.rel = "noopener noreferrer";
        button.textContent = label;
        actions.append(button);
      };

      platformDownloads.forEach((download) => {
        addPlatformButton(download);
      });
      downloadLinks.forEach((link, index) => {
        addButton(link, link.label || "Download", platformDownloads.length > 0 || index > 0);
      });
      if (website && !downloadLinks.some((link) => link.href === website.href)) {
        addButton(website, "Website", true);
      }
      if (details && !downloadLinks.some((link) => link.href === details.href) && details.href !== website?.href) {
        addButton(details, details.label || "Details", true);
      }

      if (actions.childElementCount === 0 && !primary && !website && !details) {
        const placeholder = document.createElement("span");
        placeholder.className = "button secondary";
        placeholder.setAttribute("aria-disabled", "true");
        placeholder.title = DOWNLOAD_UNAVAILABLE_MESSAGE;
        placeholder.textContent = DOWNLOAD_UNAVAILABLE_MESSAGE;
        actions.append(placeholder);
      }

      card.append(head, description, chips, actions);
      return card;
    }

    function makeHomeSection() {
      const section = document.createElement("section");
      section.id = "page-home";
      section.className = "container page";

      const hero = document.createElement("div");
      hero.className = "hero";

      const logoBlock = document.createElement("div");
      logoBlock.className = "logo-block";
      const logo = document.createElement("img");
      logo.src = "pjey-labs-logo.png";
      logo.width = 132;
      logo.height = 132;
      logo.alt = "PJey Labs logo";
      const heading = document.createElement("div");
      heading.className = "logo-copy";
      const title = document.createElement("h1");
      title.textContent = "PJey Labs";
      const lead = document.createElement("p");
      lead.className = "hero-copy";
      lead.textContent =
        "PJey Labs is an independent software studio building practical cross-platform apps, AI-powered tools, and developer workflows that help people move faster in everyday work. We focus on useful products that are simple to access, reliable across devices, and shaped around real productivity, from lightweight utilities to smarter automation for Windows, Android, web, and emerging platforms.";
      heading.append(title, lead);
      logoBlock.append(logo, heading);

      section.append(hero);
      hero.append(logoBlock);
      return section;
    }

    function makeAboutSection() {
      const section = document.createElement("section");
      section.id = "page-about";
      section.className = "container page hidden";

      const heading = document.createElement("h2");
      heading.className = "section-title";
      heading.textContent = "About";

      const card = document.createElement("div");
      card.className = "about-grid";

      const identity = document.createElement("div");
      const logo = document.createElement("img");
      logo.src = "pjey-labs-logo.png";
      logo.width = 56;
      logo.height = 56;
      logo.alt = "PJey Labs logo";
      logo.style.borderRadius = "12px";
      logo.style.border = "1px solid rgba(32, 214, 139, 0.4)";
      logo.style.objectFit = "cover";

      const name = document.createElement("h3");
      name.style.marginBottom = "0.2rem";
      name.textContent = "PJey Labs";
      const description = document.createElement("p");
      description.textContent =
        "PJey Labs is a small software studio focused on building useful apps, developer tools, and AI-assisted workflows across Windows, Android, and other platforms.";
      identity.append(name, description);

      const contactWrap = document.createElement("div");
      contactWrap.className = "contact-list";
      contactWrap.innerHTML =
        '<a href="mailto:contact@pjeylabs.com">contact@pjeylabs.com</a><a href="https://www.pjeylabs.com" target="_blank" rel="noopener noreferrer">www.pjeylabs.com</a>';

      card.append(logo, identity, contactWrap);
      section.append(heading, card);
      return section;
    }

    function AppHubSection() {
      const section = document.createElement("section");
      section.id = "page-products";
      section.className = "container page hidden";

      const heading = document.createElement("h2");
      heading.className = "section-title";
      heading.textContent = "All PJey Labs Apps";

      const subtitle = document.createElement("p");
      subtitle.className = "section-subtitle";
      subtitle.textContent = "Browse every PJey Labs application and get the latest downloads in one place.";

      const status = document.createElement("p");
      status.id = "apps-state";
      status.className = "state-line";

      const listWrapper = document.createElement("div");
      listWrapper.className = "apps-scroll";

      const grid = document.createElement("div");
      grid.className = "grid";
      grid.id = "apps-grid";

      listWrapper.append(grid);
      section.append(heading, subtitle, status, listWrapper);
      return section;
    }

    function makeDownloadSection() {
      const section = document.createElement("section");
      section.id = "page-download";
      section.className = "container page hidden";
      return section;
    }

    function makeFooter() {
      const footer = document.createElement("footer");
      footer.className = "site-footer";
      const inner = document.createElement("div");
      inner.className = "container footer-inner";

      const brand = document.createElement("div");
      brand.className = "brand";
      brand.style.gap = "0.55rem";
      const logo = document.createElement("img");
      logo.src = "pjey-labs-logo.png";
      logo.width = 28;
      logo.height = 28;
      logo.alt = "";
      const text = document.createElement("span");
      text.textContent = "PJey Labs";
      brand.append(logo, text);

      const email = document.createElement("a");
      email.href = "mailto:contact@pjeylabs.com";
      email.textContent = "contact@pjeylabs.com";

      const website = document.createElement("a");
      website.href = "https://www.pjeylabs.com";
      website.target = "_blank";
      website.rel = "noopener noreferrer";
      website.textContent = "www.pjeylabs.com";

      const copyright = document.createElement("span");
      copyright.textContent = "© 2026 PJey Labs. All rights reserved.";

      inner.append(brand, email, website, copyright);
      footer.append(inner);
      return footer;
    }

    function setPage(pageId) {
      state.activePage = pageId;
      const home = document.getElementById("page-home");
      const about = document.getElementById("page-about");
      const products = document.getElementById("page-products");
      const download = document.getElementById("page-download");

      if (home) home.classList.toggle("hidden", pageId !== "home");
      if (about) about.classList.toggle("hidden", pageId !== "about");
      if (products) products.classList.toggle("hidden", pageId !== "products");
      if (download) download.classList.toggle("hidden", pageId !== "download");

      document.querySelectorAll(".tabs button").forEach((button) => {
        const isActive = button.dataset.page === pageId;
        button.setAttribute("aria-current", String(isActive));
      });

      if (pageId === "products") {
        renderAppsHub();
      }
    }

    function getVisibleApps() {
      return [...state.apps].sort(compareAppSort);
    }

    function getStateMessage() {
      if (state.status === "loading") {
        return "Loading PJey Labs apps from Hub...";
      }

      if (state.status === "error") {
        return state.error || "Unable to load apps.";
      }

      if (state.status === "empty") {
        return state.error || "No active Hub apps were returned.";
      }

      return "";
    }

    function setLoadingState(message) {
      state.status = "loading";
      state.error = message || "";
      renderAppSections();
    }

    function renderAppsHub() {
      const status = document.getElementById("apps-state");
      const grid = document.getElementById("apps-grid");
      if (!grid || !status) {
        return;
      }

      const message = getStateMessage();
      status.className = `state-line${message ? " visible" : ""}`;
      status.textContent = message;

      const apps = getVisibleApps();
      if (apps.length === 0 && state.status === "loading") {
        const placeholder = document.createElement("p");
        placeholder.className = "apps-preview-empty";
        placeholder.textContent = "Loading apps from Hub...";
        grid.replaceChildren(placeholder);
        return;
      }

      if (apps.length === 0) {
        const placeholder = document.createElement("p");
        placeholder.className = "apps-preview-empty";
        placeholder.textContent = "No active Hub apps were returned from public_apps.";
        grid.replaceChildren(placeholder);
        return;
      }

      grid.replaceChildren(...apps.map((app) => AppCard(app)));
    }

    function renderAppSections() {
      renderAppsHub();
    }

    async function hydrateApps() {
      setLoadingState("Loading PJey Labs apps from Hub...");
      const service = new FirebaseAppsService(FIREBASE_CONFIG);
      try {
        const result = await service.loadApps();
        state.apps = result.apps || [];
        state.status = result.status || "loaded";
        state.error = result.error || "";
        state.sourceCollection = result.sourceCollection || null;
      } catch (error) {
        console.error("Could not load PJey Labs apps from Hub", error);
        state.apps = [];
        state.status = "error";
        state.error = error?.message || "Unable to load apps from Firebase.";
      }

      renderAppSections();
    }

    function buildPage() {
      const shell = document.createDocumentFragment();
      shell.append(
        makeHeader(),
        makeHomeSection(),
        makeAboutSection(),
        AppHubSection(),
        makeDownloadSection(),
        makeFooter()
      );
      appRoot.append(shell);
      setPage("home");
    }

    buildPage();
    hydrateApps();
  </script>
</body>
</html>
